name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PACKAGE: calendar
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  check:
    name: Typecheck & Unit
    runs-on: ubuntu-latest
    steps:
      # This PR's code, checked out into its member slot. The workspace root is
      # not a committed repo — bootstrap assembles it from scratch around this
      # checkout. `--assemble-only` clones the `tinycld` member (app shell + core
      # + package-scripts) plus this PACKAGE, skipping PACKAGE's slot since it's
      # already present, so CI tests this PR's code.
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: corepack enable && pnpm install --no-frozen-lockfile
      - name: Typecheck + unit
        working-directory: ws/${{ env.PACKAGE }}
        run: pnpm exec tinycld-pkg check

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: corepack enable && pnpm install --no-frozen-lockfile
      # Installs watchman so Metro's file watcher doesn't fall back to
      # polling — see tinycld/app#21 for the trace evidence and the
      # blank-page-after-reload flake it fixed.
      - name: Configure test env
        uses: ./ws/tinycld/.github/actions/configure-test-env
      - name: Install Playwright browsers
        working-directory: ws/tinycld
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E
        working-directory: ws/${{ env.PACKAGE }}
        run: pnpm exec tinycld-pkg test:e2e
      # Capture Playwright's per-failure artifacts (trace, screenshot,
      # video, error-context.md) so a CI failure can be diagnosed
      # without a re-run. `if: failure()` skips the upload on green
      # runs to save bandwidth + retention.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            ws/${{ env.PACKAGE }}/test-results/
            ws/${{ env.PACKAGE }}/playwright-report/
          retention-days: 14
